# =============================================================================
# SUMO RL Training Configuration
# =============================================================================
# Használat:
#   python main_headless.py --config training_config.yaml
#   python main_headless.py --junction R1C1_C --algorithm ppo --reward-mode speed_throughput
# =============================================================================

# --- Hálózati fájlok ---
net_file: data/mega_catalogue_v2.net.xml
logic_file: data/traffic_lights.json
detector_file: data/detectors.add.xml

# --- WandB ---
project_name: sumo-rl-catalogue
wandb_api_key: ""   # Használd a WANDB_API_KEY env változót inkább!

# --- Tanítási paraméterek ---
total_timesteps: 100000

# --- RL algoritmus ---
# Támogatott: qrdqn, dqn, ppo, a2c
# Off-policy (qrdqn, dqn): replay buffer, epsilon-greedy
# On-policy (ppo, a2c): rollout buffer, policy gradient
algorithm: qrdqn

# --- Reward mód ---
# speed_throughput: AvgSpeed + Throughput (log-tanh) ← legjobb η²
# halt_ratio:       HaltRatio (log-tanh) ← legrobusztusabb
# co2_speedstd:     TotalCO2 + SpeedStd (log-tanh)
reward_mode: speed_throughput

# --- Környezeti beállítások ---
env_kwargs:
  delta_time: 5
  reward_weights:
    waiting: 1.0
    co2: 1.0

# --- Hiperparaméterek ---
hyperparams:
  learning_rate: 0.0001
  batch_size: 32
  buffer_size: 10000
  gamma: 0.99
  exploration_fraction: 0.85
  num_layers: 2
  layer_size: 64
  train_freq: 4
  gradient_steps: 1
  # PPO specifikus (csak PPO-nál használt)
  n_steps: 2048
  n_epochs: 10
  # Early stopping
  es_enabled: true
  es_patience: 20
  es_min_delta: 0.01
