# =============================================================================
# Docker Compose — SUMO RL Training
# =============================================================================
# Használat:
#   1. Hozd létre a .env fájlt:  echo "WANDB_API_KEY=your_key" > .env
#   2. Indítás:                   docker-compose up
#   3. Sweep (N párhuzamos):      docker-compose up --scale sumo-trainer=N
#
# A start.sh script interaktívan kezeli mindezt.
# =============================================================================

version: '3.8'

services:
  sumo-trainer:
    build: .
    image: sumo-rl-agent

    env_file:
      - .env   # WANDB_API_KEY itt legyen, NE a docker-compose-ban!

    environment:
      - SUMO_HOME=/usr/share/sumo
      - SWEEP_PROJECT=${SWEEP_PROJECT:-sumo-rl-sweep}
      - SWEEP_TIMESTEPS=${SWEEP_TIMESTEPS:-100000}
      - USE_LIBSUMO=1   # Docker: minden konténer külön process → mindig libsumo

    volumes:
      - ./data:/app/data
      - ./runs:/app/runs

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

    # NE induljon automatikusan — a start.sh vagy "docker-compose run" adja meg
    # Használat:
    #   Interaktív:  ./start.sh  →  válaszd a "Docker" platformot
    #   Kézi:        docker-compose run --rm sumo-trainer python main_headless.py --config training_config.yaml --timesteps 50000 --project my-project
    #   Sweep:       docker-compose run --rm sumo-trainer wandb agent SWEEP_ID
    command: ["echo", "Használd: ./start.sh vagy docker-compose run --rm sumo-trainer <parancs>"]
