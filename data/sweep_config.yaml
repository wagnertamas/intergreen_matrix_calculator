program: sweep_runner.py
method: bayes
metric:
  name: avg_reward
  goal: maximize
parameters:
  learning_rate:
    min: 0.0001
    max: 0.005
  batch_size:
    values: [32, 64, 128, 256]
  gamma:
    min: 0.90
    max: 0.999
  exploration_fraction:
    min: 0.1
    max: 0.5
  num_layers:
    min: 1
    max: 6
  layer_size:
    values: [16, 32,64, 128, 256]
