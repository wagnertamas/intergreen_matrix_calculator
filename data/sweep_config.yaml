# =============================================================================
# WandB Bayesian Sweep Configuration
# =============================================================================
# Használat:
#   # Egy junction sweep
#   wandb sweep data/sweep_config.yaml --project sumo-rl-catalogue
#   SWEEP_JUNCTION=R1C1_C wandb agent <entity>/<project>/<sweep_id>
#
#   # Algoritmus is sweep paraméter
#   SWEEP_JUNCTION=R1C1_C SWEEP_REWARD_MODE=speed_throughput wandb agent ...
# =============================================================================

program: sweep_runner.py
method: bayes

metric:
  name: avg_reward
  goal: maximize

parameters:
  # --- RL algoritmus ---
  # Megjegyzés: Ha a sweep-ben akarod összehasonlítani az algoritmusokat,
  # vedd ki a kommentet. Ha fix algoritmussal futtatsz, kommenteld be.
  # algorithm:
  #   values: [qrdqn, dqn, ppo]

  # --- Tanulási ráta ---
  learning_rate:
    distribution: log_uniform_values
    min: 0.00005
    max: 0.005

  # --- Batch méret ---
  batch_size:
    values: [32, 64, 128, 256]

  # --- Diszkont faktor ---
  gamma:
    distribution: uniform
    min: 0.90
    max: 0.999

  # --- Felfedezési arány (off-policy only) ---
  exploration_fraction:
    distribution: uniform
    min: 0.1
    max: 0.5

  # --- NEURÁLIS HÁLÓ MÉRET ---
  num_layers:
    min: 1
    max: 6

  layer_size:
    values: [8, 16, 32, 64, 128, 256]

  # --- Replay buffer méret (off-policy only) ---
  buffer_size:
    values: [5000, 10000, 25000, 50000]

  # --- Gradient steps (off-policy: hány gradient lépés env step-enként) ---
  gradient_steps:
    values: [1, 2, 4]

  # --- Maximális szimulációs idő ---
  total_timesteps:
    values: [50000, 75000, 100000]
