# =============================================================================
# Docker Compose — SUMO RL Training
# =============================================================================
# Használat:
#   1. Hozd létre a .env fájlt:  echo "WANDB_API_KEY=your_key" > .env
#   2. Indítás:                   docker-compose up
#   3. Sweep (N párhuzamos):      docker-compose up --scale sumo-trainer=N
#
# A start.sh script interaktívan kezeli mindezt.
# =============================================================================

version: '3.8'

services:
  sumo-trainer:
    build: .
    image: sumo-rl-agent

    env_file:
      - .env   # WANDB_API_KEY itt legyen, NE a docker-compose-ban!

    environment:
      - SUMO_HOME=/usr/share/sumo
      - SWEEP_PROJECT=${SWEEP_PROJECT:-sumo-rl-sweep}
      - SWEEP_TIMESTEPS=${SWEEP_TIMESTEPS:-100000}
      - USE_LIBSUMO=1   # Docker: minden konténer külön process → mindig libsumo

    volumes:
      - ./data:/app/data
      - ./runs:/app/runs

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

    # Default: headless training
    # Sweep mode-ban a start.sh felülírja a command-ot
    command: python main_headless.py --config training_config.yaml
